[graph]
all-features = false
no-default-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots ships Mozilla's CA trust anchors under this data license.
    # Required transitively by any TLS-enabled HTTP client (reqwest, etc.).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.3.3 is unmaintained. Pulled in transitively by llama-gguf;
    # we cannot fix it from this workspace. Re-evaluate on every llama-gguf
    # bump.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained; transitive via llama-gguf" },
    # number_prefix is unmaintained. Transitive via llama-gguf → indicatif.
    # Upstream-owned; track indicatif releases for a drop-in replacement.
    { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained; transitive via llama-gguf → indicatif" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
